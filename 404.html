<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | radioforus.co.uk</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --secondary: #64748b;
            --accent: #ff5400; 
            --bg: #ffffff;
            --section-bg: #f8fafc;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 8%;
            border-bottom: 1px solid var(--border);
            background: white;
        }

        .logo { font-weight: 800; font-size: 1.1rem; text-transform: uppercase; letter-spacing: -0.02em; text-decoration: none; color: inherit; }
        .logo span { color: var(--accent); }

        .error-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 8%;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .error-code {
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.05em;
            color: var(--primary);
            margin-bottom: 1rem;
            position: relative;
        }

        .error-code span {
            color: var(--accent);
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
        }

        p {
            font-size: 1.1rem;
            color: var(--secondary);
            margin-bottom: 3rem;
            max-width: 500px;
        }

        .btn {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            border: 2px solid var(--primary);
        }

        .btn:hover {
            background: transparent;
            color: var(--primary);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--secondary);
            border: 2px solid var(--border);
            margin-left: 1rem;
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        @media (max-width: 480px) {
            .btn { display: block; margin: 0.5rem 0; width: 100%; }
            .btn-secondary { margin-left: 0; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">RADIOFORUS<span>.</span></a>
    </nav>

    <div class="error-container">
        <div class="error-code">4<span>0</span>4</div>
        <h1>Sorry! the page you are looking for cannot be found or has been moved!</h1>
        
        
        <div class="actions">
            <a href="/" class="btn">Return Home</a>
            <a href="/error.html" class="btn btn-secondary">Report an Issue</a>
        </div>
    </div>

    <footer style="padding: 40px 8%; border-top: 1px solid var(--border); text-align: center; color: var(--secondary); font-size: 0.8rem;">
        &copy; 2026 RadioForUs, Made by <a href"https://jackbrown.xyz">Jack Brown</a>
    </footer>

</body>
</html>
