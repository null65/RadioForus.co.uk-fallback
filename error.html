<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadioForUs - Report an Issue</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --secondary: #64748b;
            --accent: #ff5400; 
            --bg: #ffffff;
            --section-bg: #f8fafc;
            --border: #e2e8f0;
            --input-focus: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background-color: var(--bg);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .logo-mark {
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--secondary);
            margin-bottom: 1rem;
            display: block;
        }

        h2 { 
            font-size: 2rem; 
            font-weight: 800; 
            letter-spacing: -0.04em; 
            margin-bottom: 0.5rem;
            line-height: 1.1;
        }

        p { 
            color: var(--secondary); 
            font-size: 0.95rem; 
            margin-bottom: 2.5rem; 
        }

        .form-group { text-align: left; margin-bottom: 1.5rem; }

        label { 
            display: block; 
            margin-bottom: 0.5rem; 
            font-size: 0.75rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
            color: var(--secondary);
        }

        input, textarea, select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background-color: var(--section-bg);
            color: var(--primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(255, 84, 0, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--accent);
            transform: translateY(-2px);
        }

        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            text-decoration: none;
            color: var(--secondary);
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <span class="logo-mark">RadioForUs<span> Error Reporting</span></span>
    <h2>Help us solve an error</h2>
    <p>Help us fix the issue by reporting website or video issues.</p>

    <div class="form-group">
        <label>Name / Callsign</label>
        <input type="text" id="name" placeholder="Who's reporting?" required>
    </div>

    <div class="form-group">
        <label>Category</label>
        <select id="component">
            <option value="Broken Link/404">Broken Link / 404 Error</option>
            <option value="Mobile Layout Issue">Layout Issue (Mobile/Desktop)</option>
            <option value="Video Playback">Video Playback Problem</option>
            <option value="Audio Quality">Audio/Sound Quality Issue</option>
            <option value="Sub Count Bug">Subscriber/Live Count Bug</option>
            <option value="General Suggestion">General Suggestion</option>
        </select>
    </div>

    <div class="form-group">
        <label>Details</label>
        <textarea id="message" rows="4" placeholder="Please be as specific as possible..."></textarea>
    </div>

    <button onclick="sendToDiscord()" id="submitBtn">Submit Report</button>
    
    <a href="/" class="back-link">← Back to Dashboard</a>
</div>

<script>
async function sendToDiscord() {
    const btn = document.getElementById('submitBtn');
    const name = document.getElementById('name').value;
    const comp = document.getElementById('component').value;
    const msg = document.getElementById('message').value;
    const webhookURL = "https://discord.com/api/webhooks/1491923923833721014/mSlFQqtai5cW22R06b-lobfXMIWGD75uIluWM8gpt3hqV1iBehC5qr5DwnekFQb5ZS22";

    if (!name || !msg) {
        alert("Please provide your name and the details.");
        return;
    }

    btn.innerText = "Transmitting...";
    btn.disabled = true;

    const payload = {
        embeds: [{
            title: "New Site Report",
            color: 16733184,
            fields: [
                { name: "From", value: `\`${name}\``, inline: true },
                { name: "Category", value: comp, inline: true },
                { name: "Description", value: msg }
            ],
            footer: { text: "RadioForUs" },
            timestamp: new Date().toISOString()
        }]
    };

    try {
        const response = await fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            alert("Report logged successfully. Thanks for the heads up!");
            document.getElementById('message').value = "";
            document.getElementById('name').value = "";
        } else {
            alert("Connection refused. Try again later.");
        }
    } catch (error) {
        alert("Network Error: Check your internet connection.");
    } finally {
        btn.innerText = "Submit Report";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
