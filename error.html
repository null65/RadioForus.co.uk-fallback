<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadioForUs - Report an error.</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --input-bg: #334155;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--container-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
        }

        h2 { margin-top: 0; color: var(--accent-color); font-size: 1.5rem; text-align: center; }
        p { text-align: center; font-size: 0.85rem; opacity: 0.8; margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #475569;
            background-color: var(--input-bg);
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.98); }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <h2>Report an error:</h2>
    <p>Report issues with our website or our videos.</p>

    <div class="form-group">
        <label>Name / Callsign</label>
        <input type="text" id="name" placeholder="Enter Name..." required>
    </div>

    <div class="form-group">
        <label>Nature of the error:</label>
        <select id="component">
            <option value="Main Website">Main Site (radioforus.co.uk)</option>
            <option value="Video Problem">A problem with one of our videos</option>
            <option value="Other General Issue">Other...</option>
        </select>
    </div>

    <div class="form-group">
        <label>Details</label>
        <textarea id="message" rows="4" placeholder="Briefly describe the issue..."></textarea>
    </div>

    <button onclick="sendToDiscord()" id="submitBtn">Send!</button>
</div>

<script>
async function sendToDiscord() {
    const btn = document.getElementById('submitBtn');
    const name = document.getElementById('name').value;
    const comp = document.getElementById('component').value;
    const msg = document.getElementById('message').value;
    
   
    const webhookURL = "https://discord.com/api/webhooks/1491923923833721014/mSlFQqtai5cW22R06b-lobfXMIWGD75uIluWM8gpt3hqV1iBehC5qr5DwnekFQb5ZS22";

    if (!name || !msg) {
        alert("Please provide your name and the error details.");
        return;
    }

    btn.innerText = "Sending your report";
    btn.disabled = true;

    const payload = {
        embeds: [{
            title: "Error in sending",
            color: 16737380, 
            fields: [
                { name: "Reported By", value: name, inline: true },
                { name: "Affected System", value: comp, inline: true },
                { name: "Fault Details", value: msg }
            ],
            footer: { text: "Backup hosting" },
            timestamp: new Date().toISOString()
        }]
    };

    try {
        const response = await fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            alert("Report Sent. Thanks for your help :)");
            document.getElementById('message').value = "";
        } else {
            alert("Error!");
        }
    } catch (error) {
        alert("Network Error: Could not reach server");
    } finally {
        btn.innerText = "Send Report";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
